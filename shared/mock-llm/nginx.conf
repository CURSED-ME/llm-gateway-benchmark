worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       8080;
        server_name  localhost api.openai.com;

        location /health {
            default_type text/plain;
            content_by_lua_block {
                ngx.print("OK\n")
            }
        }

        location /v1/chat/completions {
            if ($request_method != POST) {
                return 405;
            }
            
            # Deterministic 50ms artificial delay
            access_by_lua_block {
                ngx.sleep(0.05)
            }
            
            content_by_lua_block {
                local f = io.open("/etc/mock-llm/response.json", "r")
                if not f then
                    ngx.status = 500
                    ngx.say('{"error": "Cannot open response file"}')
                    return
                end
                local content = f:read("*all")
                f:close()
                ngx.header.content_type = "application/json"
                ngx.print(content)
            }
        }
        location /v1/models {
            if ($request_method != GET) {
                return 405;
            }
            content_by_lua_block {
                local f = io.open("/etc/mock-llm/models.json", "r")
                if not f then
                    ngx.status = 500
                    ngx.say('{"error": "Cannot open models file"}')
                    return
                end
                local content = f:read("*all")
                f:close()
                ngx.header.content_type = "application/json"
                ngx.print(content)
            }
        }
    }
}
