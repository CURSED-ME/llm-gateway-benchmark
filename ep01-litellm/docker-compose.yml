version: '3.8'

services:
  mock-llm:
    build:
      context: ../shared/mock-llm
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellmdb
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellmdb"]
      interval: 5s
      timeout: 3s
      retries: 3

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    environment:
      - DATABASE_URL=postgresql://litellm:litellm@postgres:5432/litellmdb
      - LITELLM_MASTER_KEY=sk-litellm-master
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4001", "--num_workers", "1"]
    ports:
      - "4001:4001"
    depends_on:
      mock-llm:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2g

  loopers:
    image: ghcr.io/cursed-me/loopers:latest
    environment:
      - REDIS_ADDR=redis:6379
      - OPENAI_BASE_URL=http://mock-llm:8080
      - SERVER_PORT=4000
    volumes:
      - ./loopers.yaml:/app/loopers.yaml
    ports:
      - "4000:4000"
    depends_on:
      mock-llm:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2g
